  <style>
    * { margin: 0; padding: 0; box-sizing: border-box; }

    :root {
      --bg: #fafaf7;
      --ink: #1a1a1a;
      --sub: #666;
      --line: #e5e3dd;
      --accent: #c8362b;
      --warm: #f5f1e8;
      --card-bg: #ffffff;
    }

    html, body {
      background: var(--bg);
      color: var(--ink);
      font-family: 'Noto Sans KR', sans-serif;
      line-height: 1.6;
      -webkit-font-smoothing: antialiased;
      scroll-behavior: smooth;
    }

    /* Topnav (메인과 동일) */
    .topnav {
      position: sticky;
      top: 0;
      z-index: 100;
      background: rgba(250,250,247,0.92);
      backdrop-filter: saturate(180%) blur(10px);
      -webkit-backdrop-filter: saturate(180%) blur(10px);
      border-bottom: 1px solid var(--line);
    }
    .topnav-inner {
      max-width: 980px;
      margin: 0 auto;
      padding: 14px 24px;
      display: flex;
      align-items: center;
      justify-content: space-between;
      gap: 20px;
    }
    .topnav-brand {
      font-family: 'Gowun Batang', serif;
      font-size: 15px;
      font-weight: 700;
      color: var(--ink);
      text-decoration: none;
      letter-spacing: -0.01em;
      white-space: nowrap;
    }
    .topnav-brand .dot {
      display: inline-block;
      width: 7px;
      height: 7px;
      background: var(--accent);
      border-radius: 50%;
      margin-right: 8px;
      vertical-align: middle;
    }
    .topnav-links {
      display: flex;
      gap: 4px;
      flex-wrap: wrap;
      justify-content: flex-end;
    }
    .topnav-links a {
      font-size: 12.5px;
      color: #555;
      text-decoration: none;
      padding: 6px 12px;
      border-radius: 4px;
      transition: background 0.15s, color 0.15s;
    }
    .topnav-links a:hover {
      background: #f5f1e8;
      color: var(--accent);
    }
    .topnav-links a.active {
      color: var(--accent);
      font-weight: 700;
    }

    .container {
      max-width: 860px;
      margin: 0 auto;
      padding: 40px 24px 60px;
    }

    /* 페이지 헤더 */
    .notes-header {
      text-align: center;
      padding: 18px 0 30px;
      border-bottom: 1px solid var(--line);
      margin-bottom: 32px;
    }
    .notes-title {
      font-family: 'Gowun Batang', serif;
      font-size: 30px;
      font-weight: 700;
      letter-spacing: -0.02em;
      margin-bottom: 8px;
      color: var(--ink);
    }
    .notes-subtitle {
      font-size: 13px;
      color: var(--sub);
      font-weight: 300;
    }

    /* 필터 탭 */
    .filter-tabs {
      display: flex;
      gap: 6px;
      justify-content: center;
      margin-bottom: 28px;
      flex-wrap: wrap;
    }
    .filter-tab {
      padding: 7px 16px;
      font-size: 12.5px;
      font-weight: 700;
      color: #777;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 18px;
      cursor: pointer;
      font-family: inherit;
      transition: all 0.15s;
    }
    .filter-tab:hover {
      color: var(--accent);
      border-color: var(--accent);
    }
    .filter-tab.active {
      background: var(--ink);
      color: #fff;
      border-color: var(--ink);
    }

    /* 포스트 카드 리스트 */
    .post-list {
      display: flex;
      flex-direction: column;
      gap: 12px;
    }
    .post-card {
      display: block;
      background: #fff;
      border: 1px solid var(--line);
      border-radius: 10px;
      padding: 20px 22px;
      text-decoration: none;
      color: inherit;
      transition: transform 0.2s, box-shadow 0.2s, border-color 0.2s;
      position: relative;
      overflow: hidden;
    }
    .post-card::before {
      content: '';
      position: absolute;
      top: 0;
      left: 0;
      width: 3px;
      height: 100%;
      background: var(--accent);
      transform: scaleY(0);
      transform-origin: top;
      transition: transform 0.2s;
    }
    .post-card:hover {
      transform: translateY(-2px);
      box-shadow: 0 6px 16px rgba(0,0,0,0.06);
      border-color: #d0cdc5;
    }
    .post-card:hover::before { transform: scaleY(1); }

    .post-meta {
      display: flex;
      align-items: center;
      gap: 10px;
      font-size: 11.5px;
      color: #888;
      margin-bottom: 8px;
    }
    .post-category {
      display: inline-flex;
      align-items: center;
      gap: 4px;
      padding: 2px 9px;
      border-radius: 10px;
      font-size: 11px;
      font-weight: 700;
    }
    .post-category.dev { background: #e8edf5; color: #2d4f7a; }
    .post-category.school { background: #eef5ee; color: #2d7a3e; }
    .post-category.life { background: #f5f1e8; color: #8a6a45; }

    .post-title {
      font-family: 'Gowun Batang', serif;
      font-size: 18px;
      font-weight: 700;
      color: var(--ink);
      margin-bottom: 6px;
      letter-spacing: -0.01em;
      line-height: 1.4;
    }
    .post-excerpt {
      font-size: 13px;
      color: var(--sub);
      line-height: 1.7;
    }
    .post-card.hidden { display: none; }

    .empty-state {
      text-align: center;
      padding: 60px 20px;
      color: #999;
      font-size: 13px;
    }

    /* Footer */
    .footer {
      text-align: center;
      padding: 30px 24px 16px;
      font-size: 12px;
      color: #999;
      border-top: 1px solid var(--line);
      max-width: 980px;
      margin: 40px auto 0;
    }

    /* Mobile */
    @media (max-width: 768px) {
      .topnav-inner { padding: 10px 16px; gap: 10px; }
      .topnav-brand { font-size: 13px; }
      .topnav-links { gap: 1px; }
      .topnav-links a { padding: 5px 8px; font-size: 11.5px; }
      .container { padding: 24px 16px 40px; }
      .notes-title { font-size: 24px; }
      .post-card { padding: 16px 18px; }
      .post-title { font-size: 16px; }
    }
    @media (max-width: 480px) {
      .topnav-inner { padding: 8px 12px; gap: 6px; }
      .topnav-brand { font-size: 12px; }
      .topnav-links a { padding: 4px 5px; font-size: 10.5px; }
    }

<body>

  <nav class="topnav">
    <div class="topnav-inner">
      <a href="../" class="topnav-brand"><span class="dot"></span>교무실 옆 작업실</a>

        <a href="../#dashboard">온무실 소개</a>
        <a href="./" class="active">작업일지</a>
        <a href="../#about">연락</a>
      </div>
    </div>
  </nav>

  <div class="container">

    <header class="notes-header">
      <h1 class="notes-title">작업일지</h1>
      <p class="notes-subtitle">교무실 한 켠, 작업 노트</p>
    </header>

    <div class="filter-tabs" id="filter-tabs">
      <button class="filter-tab active" data-filter="all">전체</button>
      <button class="filter-tab" data-filter="dev">🛠 개발</button>
      <button class="filter-tab" data-filter="school">🏫 학교생활</button>
      <button class="filter-tab" data-filter="life">📝 일상</button>
    </div>

    <div class="post-list" id="post-list">

      <a href="2026-04-24-opening.html" class="post-card" data-category="life">
        <div class="post-meta">
          <span class="post-category life">📝 일상</span>
          <span>2026.04.24.</span>
        </div>
        <h2 class="post-title">작업실을 열며</h2>
        <p class="post-excerpt">
          작년 이맘때, 깜깜한 길 위에서 문득 든 생각 하나가 여기까지 왔습니다.
          더듬더듬 만든 것들과, 그 과정을 남겨보려 합니다.
        </p>
      </a>

    </div>

    <div class="empty-state" id="empty-state" style="display:none;">
      이 카테고리에는 아직 글이 없어요. 곧 채워 넣을게요.
    </div>

  </div>

  <footer class="footer">
    © 2026 교무실 옆 작업실 · 자유롭게 써주시고, 출처만 살짝 남겨주세요.<br>
    <span style="opacity:0.7;font-size:11px;">마지막 업데이트 <span id="last-updated">2026.04.25.</span> · v1.0 · 계속 다듬어 나가는 중입니다</span>
  </footer>

  <script>
    // 필터 탭
    var tabs = document.querySelectorAll('.filter-tab');
    var cards = document.querySelectorAll('.post-card');
    var emptyState = document.getElementById('empty-state');

    tabs.forEach(function(tab){
      tab.addEventListener('click', function(){
        tabs.forEach(function(t){ t.classList.remove('active'); });
        tab.classList.add('active');
        var filter = tab.dataset.filter;
        var visibleCount = 0;
        cards.forEach(function(card){
          if (filter === 'all' || card.dataset.category === filter) {
            card.classList.remove('hidden');
            visibleCount++;
          } else {
            card.classList.add('hidden');
          }
        });
        emptyState.style.display = visibleCount === 0 ? 'block' : 'none';
      });
    });

    // 마지막 업데이트 자동 날짜
    (function(){
      var d = new Date();
      var y = d.getFullYear();
      var m = String(d.getMonth() + 1).padStart(2, '0');
      var day = String(d.getDate()).padStart(2, '0');
      var el = document.getElementById('last-updated');
      if (el) el.textContent = y + '.' + m + '.' + day + '.';
    })();
  </script>
